databases:
  - name: csharpacademy-db
    databaseName: csharpacademy
    user: csharpacademy
    plan: free

services:
  - type: web
    name: csharpacademy
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: csharpacademy-db
          property: connectionString
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: CSharpAcademy
      - key: Jwt__Audience
        value: CSharpAcademyUsers
      - key: MistralAI__ApiKey
        sync: false

<div class="mc-overlay" *ngIf="visivel" (click)="fecharOverlay()" role="dialog" aria-modal="true" aria-label="Módulo concluído">
  <div class="mc-card" (click)="$event.stopPropagation()">
    <div class="mc-icone" aria-hidden="true">🏆</div>
    <div class="mc-titulo">Módulo Concluído!</div>
    <div class="mc-nome">{{ modulo?.titulo }}</div>

    <div class="mc-stats">
      <div class="mc-stat">
        <span class="mc-stat-val">{{ modulo?.totalLicoes }}</span>
        <span class="mc-stat-label">Lições</span>
      </div>
      <div class="mc-stat-sep"></div>
      <div class="mc-stat">
        <span class="mc-stat-val mc-xp">+{{ xpTotal }} XP</span>
        <span class="mc-stat-label">Conquistados</span>
      </div>
    </div>

    <p class="mc-msg">Você dominou todo o conteúdo deste módulo. Continue assim!</p>

    <div class="mc-acoes">
      <button class="mc-btn-modulos" (click)="navegarParaModulos()">Ver todos os módulos</button>
      <button class="mc-btn-continuar" (click)="fecharOverlay()">Continuar aqui</button>
    </div>
  </div>
</div>

<div class="toast-container" role="region" aria-label="Notificações" aria-live="polite">
  <div
    *ngFor="let t of toasts; trackBy: trackById"
    [class]="'toast toast-' + t.tipo"
    [class.saindo]="t.saindo"
    role="alert"
    [attr.aria-label]="t.mensagem">
    <span class="toast-icone" aria-hidden="true">{{ icone(t.tipo) }}</span>
    <span class="toast-msg">{{ t.mensagem }}</span>
    <button class="toast-close" (click)="fechar(t.id)" aria-label="Fechar notificação">✕</button>
  </div>
</div>

<div class="toast-container">
  <div
    class="toast"
    *ngFor="let t of toasts"
    [class]="'toast toast-' + t.tipo">
    <span class="toast-icone">{{ icone(t.tipo) }}</span>
    <span class="toast-msg">{{ t.mensagem }}</span>
    <button class="toast-close" (click)="fechar(t.id)">✕</button>
  </div>
</div>

<div class="conquista-toasts">
  <div class="conquista-toast" *ngFor="let t of toastsConquistas">
    <span class="toast-icone">{{ t.icone }}</span>
    <div class="toast-texto">
      <span class="toast-titulo">{{ t.titulo }}</span>
      <span class="toast-desc">{{ t.descricao }}</span>
    </div>
  </div>
</div>

<div class="licao-page">
  <aside class="sidebar">
    <h3>Lições</h3>
    <div class="loading" *ngIf="carregando">Carregando...</div>
    <ul *ngIf="!carregando">
      <li
        *ngFor="let l of licoes"
        (click)="selecionarLicao(l)"
        [class.ativa]="licaoSelecionada?.id === l.id"
        [class.completada]="l.completada">
        <span class="check" *ngIf="l.completada">✓</span>
        {{ l.titulo }}
        <span class="xp">+{{ l.xpRecompensa }} XP</span>
      </li>
    </ul>
  </aside>

  <main class="content" *ngIf="licaoSelecionada">
    <div class="licao-header">
      <h1>{{ licaoSelecionada.titulo }}</h1>
      <p>{{ licaoSelecionada.descricao }}</p>
    </div>
    <div class="teoria markdown-body">
      <markdown [data]="licaoSelecionada.conteudoTeoricoMarkdown"></markdown>
    </div>

    <div class="acoes">
      <button class="btn-exercicios" (click)="irParaExercicios()">&#128196; Praticar Exercícios</button>
      <button class="btn-concluir" [disabled]="licaoSelecionada.completada || concluindo" (click)="concluirLicao()">
        {{ licaoSelecionada.completada ? '✓ Concluída' : concluindo ? 'Salvando...' : 'Marcar como Concluída' }}
      </button>
    </div>

    <div class="mensagem-conclusao" *ngIf="mensagemConclusao">{{ mensagemConclusao }}</div>

    <!-- Professor Assistente integrado -->
    <app-assistant-chat [licaoId]="licaoSelecionada.id"></app-assistant-chat>
  </main>
</div>

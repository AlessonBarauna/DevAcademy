<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🎓</div>
    <h1>Criar Conta</h1>
    <p class="subtitle">Comece a aprender C# hoje</p>

    <div class="error-msg" *ngIf="erro">{{ erro }}</div>

    <div class="form-group">
      <label>Nome</label>
      <input type="text" [(ngModel)]="nome" placeholder="Seu nome" />
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" [(ngModel)]="email" placeholder="seu@email.com" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" [(ngModel)]="senha" placeholder="••••••••" (keyup.enter)="registrar()" />
    </div>

    <button (click)="registrar()" [disabled]="carregando" class="btn-primary">
      {{ carregando ? 'Criando conta...' : 'Criar Conta' }}
    </button>

    <p class="link-text">Já tem conta? <a routerLink="/login">Entrar</a></p>
  </div>
</div>
